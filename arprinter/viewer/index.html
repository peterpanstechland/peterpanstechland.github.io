<!doctype HTML>
<html>
<script src="src/aframe.min.js"></script>
<script src="src/aframe-ar.js"></script>
  <body style='margin : 0px; overflow: hidden;'>
    <a-assets>
      <video id="car" autoplay loop="true" src="assets/tub.mp4"></video>
    </a-assets>
    <a-scene embedded arjs>
      <a-marker preset="hiro">
          <!-- <a-box position='0 0.5 0' material='color: red;'></a-box> -->
          <a-video src="#car"  width="4.5" height="8" position="0 0 -20" play="true"></a-video>
      </a-marker>
      <a-marker type="pattern" url="marker/PYTHON.patt">
          <a-box position='0 0.5 0' material='color: yellow;'></a-box>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
